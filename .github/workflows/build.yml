name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Download NDK r29
        run: |
          curl -sL -o /tmp/ndk.tar.gz \
            "https://github.com/SnowNF/ndk-aarch64-linux/releases/download/0.0.2/android-ndk-r29-linux-aarch64.tar.gz"
          sudo mkdir -p /opt/ndk
          sudo tar xzf /tmp/ndk.tar.gz -C /opt/ndk
          ls /opt/ndk/

      - name: Find NDK clang
        run: |
          NDK_BIN=$(ls -d /opt/ndk/*/toolchains/llvm/prebuilt/*/bin 2>/dev/null | head -1)
          echo "NDK_BIN=$NDK_BIN"
          CLANG=$(ls $NDK_BIN/aarch64-linux-android*-clang 2>/dev/null | grep -v clang++ | head -1)
          CLANGXX=$(ls $NDK_BIN/aarch64-linux-android*-clang++ 2>/dev/null | head -1)
          AR=$(ls $NDK_BIN/llvm-ar 2>/dev/null | head -1)
          echo "clang: $CLANG"
          echo "clang++: $CLANGXX"
          echo "ar: $AR"
          echo "CC_aarch64_linux_android=$CLANG" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$CLANGXX" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$AR" >> $GITHUB_ENV

      - name: Patch C++ sources for Android
        run: |
          SRCDIR=SKRoot/Lite_version/src/patch_kernel_root
          # Add <unistd.h> for _exit()
          sed -i '1i#include <unistd.h>' $SRCDIR/patch_base.cpp
          # Fix IF_EXIT: remove system("pause"), keep exit
          sed -i 's|printf("\[ERROR\] Patch empty addr!\\n"); system("pause"); exit(0)|fprintf(stderr, "[ERROR] Patch empty addr!\\n"); _exit(1)|' $SRCDIR/patch_kernel_root.h
          # Add <cstdint> for uint32_t/uint64_t
          sed -i 's|#include <vector>|&\n#include <cstdint>|' $SRCDIR/analyze/init_cred_searcher.h
          # Add <cstring> for memcmp
          sed -i 's|#include <algorithm>|&\n#include <cstring>|' $SRCDIR/analyze/init_cred_searcher.cpp
          # Add <cctype> for isdigit
          sed -i 's|#include <cstring>|&\n#include <cctype>|' $SRCDIR/analyze/kernel_version_parser.cpp
          # Remove <filesystem> from header (not needed)
          sed -i '/#include <filesystem>/d' $SRCDIR/patch_kernel_root.h

      - name: Build
        run: |
          file $CC_aarch64_linux_android
          cargo build --target aarch64-linux-android --release 2>&1

      - name: Verify binary
        run: |
          ls -lh target/aarch64-linux-android/release/patch_kernel_root
          file target/aarch64-linux-android/release/patch_kernel_root
          echo "--- NEEDED ---"
          readelf -d target/aarch64-linux-android/release/patch_kernel_root | grep NEEDED || echo "(none)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch_kernel_root
          path: target/aarch64-linux-android/release/patch_kernel_root
